_format_version: "3.0"
_transform: true

services:
  - name: auth-v1
    url: http://auth:9999
    routes:
      - name: auth-v1-all
        paths:
          - /auth/v1/
    plugins:
      - name: cors

  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-v1-all
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
      - name: request-transformer
        config:
          add:
            headers:
              - Accept:application/json

  - name: storage-v1
    url: http://storage-api:5000
    routes:
      - name: storage-v1-all
        paths:
          - /storage/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true

  - name: realtime-v1
    url: http://realtime:4000
    routes:
      - name: realtime-v1-all
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true

  - name: meta-v1
    url: http://supabase-meta:8080
    routes:
      - name: meta-v1-all
        paths:
          - /meta/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true

