services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_HOST: ${N8N_HOST:-localhost}
      WEBHOOK_URL: http://${N8N_HOST:-localhost}:${N8N_PORT:-5678}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution-api:8080}
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped
    depends_on:
      evolution-api:
        condition: service_started

  supabase-db:
    image: supabase/postgres:17.6.1.136
    ports:
      - "5432:5432"
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - supabase-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  supabase-meta:
    image: supabase/postgres-meta:v0.96.6
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: postgres
      PG_META_DB_NAME: postgres
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

  studio:
    image: supabase/studio:2026.06.03-sha-0bca601
    ports:
      - "54323:3000"
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      SUPABASE_URL: http://localhost:54323
      SUPABASE_PUBLIC_URL: http://localhost:54323
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdEDwNnoQ9oGb2dG6o5kqE
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZxq5JzHGs6dN4eQZ8uKQjW4l2FhB1oXo7tI
    depends_on:
      supabase-meta:
        condition: service_started
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:latest
    ports:
      - "${EVOLUTION_API_PORT:-8080}:8080"
    environment:
      SERVER_URL: http://localhost:${EVOLUTION_API_PORT:-8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evolution_dev_key}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@supabase-db:5432/postgres
      REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
    depends_on:
      redis:
        condition: service_started
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  qdrant-data:
  n8n-data:
  supabase-pg-data:
