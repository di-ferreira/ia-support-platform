services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_HOST: ${N8N_HOST:-localhost}
      WEBHOOK_URL: http://${N8N_HOST:-localhost}:${N8N_PORT:-5678}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution-api:8080}
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped
    depends_on:
      evolution-api:
        condition: service_started

  supabase-db:
    image: supabase/postgres:17.6.1.136
    ports:
      - "5432:5432"
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - supabase-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  supabase-meta:
    image: supabase/postgres-meta:v0.96.6
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: postgres
      PG_META_DB_NAME: postgres
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

  kong:
    image: kong/kong:3.9.1
    ports:
      - "${KONG_HTTP_PORT:-8008}:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_DNS_ORDER: LAST, AAAA, A
      KONG_PLUGINS: request-transformer, cors, key-auth, basic-auth, hmac-auth, jwt, acl, ip-restriction
      KONG_NGINX_WORKER_PROCESSES: 1
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./supabase/kong.yml:/etc/kong/kong.yml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  auth:
    image: supabase/gotrue:v2.189.0
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8008}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://supabase_auth_admin:postgres@supabase-db:5432/postgres
      GOTRUE_DB_MAX_OPEN_CONNS: 100
      GOTRUE_MAILER_AUTOCONFIRM: true
      GOTRUE_LOG_LEVEL: info
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

  rest:
    image: postgrest/postgrest:v14.12
    environment:
      PGRST_DB_URI: postgresql://postgres:postgres@supabase-db:5432/postgres
      PGRST_DB_SCHEMA: public,storage
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_AGGREGATES_ENABLED: true
      PGRST_DB_EXTRA_SEARCH_PATH: public,storage,extensions
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

  studio:
    image: supabase/studio:2026.06.03-sha-0bca601
    ports:
      - "54323:3000"
    environment:
      HOSTNAME: 0.0.0.0
      STUDIO_PG_META_URL: http://supabase-meta:8080
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:54323}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/platform/profile').then((r) => {if (r.status !== 200) throw new Error(r.status)}).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s
    depends_on:
      kong:
        condition: service_healthy
      supabase-meta:
        condition: service_started
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:latest
    ports:
      - "${EVOLUTION_API_PORT:-8080}:8080"
    environment:
      SERVER_URL: http://localhost:${EVOLUTION_API_PORT:-8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evolution_dev_key}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@supabase-db:5432/postgres
      REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
    depends_on:
      redis:
        condition: service_started
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  qdrant-data:
  n8n-data:
  supabase-pg-data:
